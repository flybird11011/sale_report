services:
  sales-report:
    build:
      context: .
    container_name: sales-report
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      UPLOAD_FOLDER: /data/uploads
      OUTPUT_FOLDER: /data/output
      MAPPINGS_FILE: /data/saved_mappings.json
      PORT: "5000"
      HOST: "0.0.0.0"
      FLASK_DEBUG: "0"
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - webproxy

networks:
  webproxy:
    external: true
    name: webproxy
